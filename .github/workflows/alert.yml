name: RAPTOR Portafoglio — Alert Stop

on:
  schedule:
    - cron: '0,30 6-18 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  alert-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Esegui Alert Check
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python alert_check.py

      - name: Commit stato alert (se cambiato)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain alert_state.json)" ]; then
            git add alert_state.json
            git commit -m "Aggiorna stato alert [skip ci]"
            git push
          else
            echo "Nessuna modifica allo stato — skip commit"
          fi
